<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 마피아 - 첫날 투표 금지 버전</title>
    <style>
        :root { --bg-color: #0f172a; --box-color: #1e293b; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg-color); color:white; display: flex; justify-content: center; padding: 20px; margin:0; }
        #container { width: 100%; max-width: 650px; background: var(--box-color); padding: 25px; border-radius: 15px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4); margin-top: 20px; }
        .box { display: flex; flex-direction: column; align-items: center; gap: 15px; background: #334155; padding: 30px; border-radius: 10px; text-align: center; }
        .rule-box { background: #1e293b; padding: 15px; border-radius: 8px; text-align: left; font-size: 0.85em; width: 100%; color: #cbd5e1; line-height: 1.8; border: 1px solid #475569; margin-top: 10px; }
        #chat { height: 400px; overflow-y: auto; background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #475569; }
        .system-msg { color: #fbbf24; font-weight: bold; border-left: 4px solid #fbbf24; padding: 8px 12px; margin: 10px 0; font-size: 0.9em; background: rgba(251, 191, 36, 0.1); }
        .vote-style { color: #38bdf8; font-weight: bold; background: rgba(56, 189, 248, 0.1); padding: 5px; border-radius: 5px; display: block; margin: 5px 0; border: 1px dashed #38bdf8; font-size: 0.85em; }
        .name-tag { font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; margin-right: 5px; }
        .name-user { background: #3b82f6; color: white; }
        .name-ai { background: #64748b; color: #e2e8f0; }
        button { cursor: pointer; padding: 10px 15px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; width: 220px; }
        #chatInput { flex:1; text-align: left; width: auto; }
        .player-card { padding: 8px 12px; background: #475569; border-radius: 5px; font-size: 0.85em; min-width: 70px; text-align: center; }
        .dead { opacity: 0.3; text-decoration: line-through; background: #1e293b; }
        table { width:100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; background: #1e293b; }
        th, td { padding: 8px; border: 1px solid #475569; text-align: center; }
    </style>
</head>
<body>

<div id="container">
    <h1 style="text-align: center; color: #60a5fa; margin-bottom: 20px;">🕵️‍♂️ AI 마피아</h1>

    <div id="loginSection" class="box">
        <input id="nameInput" placeholder="이름을 입력하세요">
        <button id="loginBtn">게임 입장</button>
    </div>

    <div id="homeSection" class="box" style="display:none;">
        <h2 id="welcomeText"></h2>
        <div style="font-size: 1.1em; margin-bottom: 5px;">내 점수: <b id="myScore" style="color:#fbbf24">0</b></div>
        <button id="startBtn" style="width: 100%; background: #10b981; margin-bottom: 5px;">🎮 게임 시작</button>
        <button id="rankBtn" style="width: 100%; background: #64748b;">🏆 랭킹 보기</button>
        <div class="rule-box">
            <b>[수정된 정규 룰]</b><br>
            1. <b>첫날 투표 금지:</b> 첫째 날은 대화만 하며, 투표는 둘째 날부터 시작됩니다.<br>
            2. <b>매일 투표:</b> 2, 3, 4일차에는 매일 투표가 진행됩니다.<br>
            3. <b>침묵 유지:</b> 밤과 투표 시간엔 AI도 입을 꾹 닫습니다.<br>
            4. <b>심리전:</b> 첫날 충분히 대화하며 의심스러운 사람을 찾아보세요!
        </div>
    </div>

    <div id="rankingSection" class="box" style="display:none;">
        <h3>🏆 랭킹</h3>
        <div id="rankList" style="width:100%"></div>
        <button id="backBtn">뒤로가기</button>
    </div>

    <div id="gameSection" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div id="userProfile" style="font-weight: bold; color: #60a5fa;"></div>
            <div id="phaseInfo" style="font-weight: bold;"></div>
            <div id="timerDisplay" style="color: #f87171; font-weight: bold; font-size: 1.2em;"></div>
        </div>
        <div id="roleBanner" style="background: #334155; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; font-weight: bold;"></div>
        <div id="playerList" style="display: flex; gap: 5px; margin-bottom: 10px; justify-content: center; flex-wrap: wrap;"></div>
        <div id="chat"></div>
        <div id="controls" style="display:flex; gap:5px;">
            <input id="chatInput" placeholder="대화 입력...">
            <button id="sendBtn">전송</button>
        </div>
        <div id="actions" style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;"></div>
    </div>
</div>

<script>
let players = [], roles = {}, alive = {}, suspicion = {};
let playerName = "", currentPhaseIdx = 0, timer = 0, timerInterval, aiInterval, pendingKill = null, userScore = 0, votes = {};

// 첫째날 투표가 없는 정식 스케줄
const phases = [
    { name: "첫째날", duration: 60, night: false, vote: false }, 
    { name: "첫째날 밤", duration: 20, night: true, vote: false },
    { name: "둘째날", duration: 60, night: false, vote: false }, 
    { name: "둘째날 투표", duration: 25, night: false, vote: true },
    { name: "둘째날 밤", duration: 20, night: true, vote: false },
    { name: "셋째날", duration: 60, night: false, vote: false },
    { name: "셋째날 투표", duration: 25, night: false, vote: true },
    { name: "셋째날 밤", duration: 20, night: true, vote: false },
    { name: "넷째날", duration: 60, night: false, vote: false },
    { name: "넷째날 최종 투표", duration: 30, night: false, vote: true }
];

document.getElementById("loginBtn").onclick = () => {
    playerName = document.getElementById("nameInput").value.trim();
    if(!playerName) return;
    userScore = parseInt(localStorage.getItem('mafia_score_' + playerName)) || 0;
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("homeSection").style.display = "flex";
    document.getElementById("welcomeText").innerText = `반갑습니다, ${playerName}님!`;
    document.getElementById("myScore").innerText = userScore;
};

document.getElementById("rankBtn").onclick = () => {
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("rankingSection").style.display = "flex";
    let scores = [];
    for(let i=0; i<localStorage.length; i++){
        let key = localStorage.key(i);
        if(key.startsWith('mafia_score_')) scores.push({name: key.replace('mafia_score_', ''), score: parseInt(localStorage.getItem(key))});
    }
    scores.sort((a,b) => b.score - a.score);
    document.getElementById("rankList").innerHTML = `<table><tr><th>순위</th><th>이름</th><th>점수</th></tr>${scores.map((s,i)=>`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.score}</td></tr>`).join('')}</table>`;
};

document.getElementById("backBtn").onclick = () => {
    document.getElementById("rankingSection").style.display = "none";
    document.getElementById("homeSection").style.display = "flex";
};

document.getElementById("startBtn").onclick = () => {
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
    initGame();
};

function initGame() {
    players = [playerName, "지수", "민호", "현우", "서윤", "준성"];
    players.forEach(p => { alive[p] = true; suspicion[p] = 5; });
    let mafia = players[Math.floor(Math.random() * players.length)];
    players.forEach(p => roles[p] = (p === mafia ? "마피아" : "시민"));
    document.getElementById("userProfile").innerText = `👤 ${playerName}`;
    document.getElementById("roleBanner").innerHTML = `정체: <span style="color:${roles[playerName]==='마피아'?'#ef4444':'#60a5fa'}">${roles[playerName]}</span>`;
    currentPhaseIdx = 0; document.getElementById("chat").innerHTML = "";
    runPhase();
}

function addLog(name, msg, type = "") {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.style.marginBottom = "8px";
    if (name === "시스템") {
        div.className = "system-msg";
        div.innerHTML = msg;
    } else if (type === "vote") {
        div.className = "vote-style";
        div.innerHTML = `🗳️ ${msg}`;
    } else {
        const tag = name === playerName ? "name-user" : "name-ai";
        div.innerHTML = `<span class="name-tag ${tag}">${name}</span> ${msg}`;
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function runPhase() {
    if (checkWin()) return;
    const phase = phases[currentPhaseIdx];
    document.getElementById("phaseInfo").innerText = `📅 ${phase.name}`;
    timer = phase.duration; votes = {};

    const canChat = alive[playerName] && !phase.night && !phase.vote;
    document.getElementById("chatInput").disabled = !canChat;
    document.getElementById("sendBtn").disabled = !canChat;
    document.getElementById("chatInput").placeholder = canChat ? "대화를 입력하세요..." : "지금은 조용히 하세요.";

    if (!phase.night && !phase.vote && currentPhaseIdx > 0) {
        document.getElementById("chat").innerHTML = "";
        addLog("시스템", "☀️ 아침이 밝았습니다. 대화 기록이 청소되었습니다.");
    }

    document.body.style.background = phase.night ? "#020617" : "#0f172a";
    
    if (canChat) triggerAIs();
    else clearInterval(aiInterval);

    if (phase.night) {
        addLog("시스템", roles[playerName] === "마피아" ? "🌙 밤입니다. 대상을 고르세요." : "🌙 밤입니다. 시민들은 잠에 듭니다.");
    }

    if (!phase.night && !phase.vote && pendingKill) {
        addLog("시스템", `❗ 알림: 어젯밤 <b>${pendingKill}</b>님이 살해당했습니다.`);
        alive[pendingKill] = false; pendingKill = null;
        if (checkWin()) return;
    }

    updateUI(); startTimer();
    if (phase.vote) setTimeout(triggerAIVotes, 3000);
    if (phase.night) runAINightAction();
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timer--; document.getElementById("timerDisplay").innerText = `${timer}s`;
        if (timer <= 0) {
            clearInterval(timerInterval);
            if (phases[currentPhaseIdx].vote) processVoteResult();
            currentPhaseIdx++;
            if (currentPhaseIdx < phases.length) runPhase();
            else checkWin(true);
        }
    }, 1000);
}

function updateUI() {
    const phase = phases[currentPhaseIdx];
    document.getElementById("playerList").innerHTML = players.map(p => `<div class="player-card ${alive[p] ? '' : 'dead'}">${p}</div>`).join("");
    const actions = document.getElementById("actions"); actions.innerHTML = "";
    if (alive[playerName]) {
        players.forEach(p => {
            if (p !== playerName && alive[p]) {
                if (phase.vote && !votes[playerName]) {
                    let btn = document.createElement("button"); btn.innerText = `${p} 투표`;
                    btn.onclick = () => { votes[playerName] = p; addLog("시스템", `${p}님에게 투표했습니다.`, "vote"); updateUI(); };
                    actions.appendChild(btn);
                } else if (phase.night && roles[playerName] === "마피아") {
                    let btn = document.createElement("button"); btn.innerText = `${p} 처단`;
                    btn.onclick = () => { pendingKill = p; addLog("시스템", `🎯 ${p}님을 목표로 설정.`); };
                    actions.appendChild(btn);
                }
            }
        });
    }
}

function triggerAIs() {
    clearInterval(aiInterval);
    aiInterval = setInterval(() => {
        if (phases[currentPhaseIdx].night || phases[currentPhaseIdx].vote) return;
        let aiPlayers = players.filter(p => p !== playerName && alive[p]);
        let speaker = aiPlayers[Math.floor(Math.random() * aiPlayers.length)];
        if (!speaker) return;

        let others = players.filter(t => t !== speaker && alive[t]);
        let target = Math.random() > 0.9 ? playerName : others.filter(o => o !== playerName)[Math.floor(Math.random() * (others.length - 1))];
        if(!target) target = others[0];

        addLog(speaker, `${target}님, 수상해요. 마피아 아니에요?`);
        suspicion[target] += 2;
        
        if (target !== playerName && alive[target] && Math.random() > 0.5) {
            setTimeout(() => { 
                if(!phases[currentPhaseIdx].night && !phases[currentPhaseIdx].vote) {
                    addLog(target, `무슨 소리예요? 전 시민입니다!`); 
                    suspicion[speaker]+=3; 
                }
            }, 2000);
        }
    }, 12000);
}

function triggerAIVotes() {
    players.filter(p => p !== playerName && alive[p]).forEach(ai => {
        let target = players.filter(t => t !== ai && alive[t]).sort((a,b) => suspicion[b] - suspicion[a])[0];
        votes[ai] = target;
        addLog("시스템", `${ai} → ${target} 투표`, "vote");
    });
}

function processVoteResult() {
    let count = {};
    Object.values(votes).forEach(v => count[v] = (count[v] || 0) + 1);
    let victim = Object.keys(count).sort((a,b) => count[b] - count[a])[0];
    if (victim) { addLog("시스템", `⚖️ 투표 결과, <b>${victim}</b>님이 처형되었습니다.`); alive[victim] = false; }
}

function runAINightAction() {
    players.forEach(p => { if (p !== playerName && alive[p] && roles[p] === "마피아") {
        let t = players.filter(v => roles[v] !== "마피아" && alive[v]);
        pendingKill = t[Math.floor(Math.random() * t.length)];
    }});
}

function handleChat() {
    const input = document.getElementById("chatInput");
    const msg = input.value.trim();
    if(!msg || !alive[playerName] || phases[currentPhaseIdx].night || phases[currentPhaseIdx].vote) return;
    addLog(playerName, msg);
    input.value = "";
    if(msg.includes("시민") || msg.includes("아니")) {
        suspicion[playerName] -= 5;
    }
}

document.getElementById("sendBtn").onclick = handleChat;
document.getElementById("chatInput").onkeydown = (e) => { if(e.key === 'Enter') handleChat(); };

function checkWin(isFinal = false) {
    const m = players.filter(p => roles[p] === "마피아" && alive[p]).length;
    const c = players.filter(p => roles[p] === "시민" && alive[p]).length;
    if (m === 0) return finishGame("시민");
    if (m >= c) return finishGame("마피아");
    if (isFinal) return finishGame(m > 0 ? "마피아" : "시민");
    return false;
}

function finishGame(winner) {
    clearInterval(timerInterval); clearInterval(aiInterval);
    userScore += (roles[playerName] === winner ? 30 : 10);
    localStorage.setItem('mafia_score_' + playerName, userScore);
    let table = `<h3>🏆 ${winner} 승리!</h3><table><tr><th>이름</th><th>역할</th><th>상태</th></tr>`;
    players.forEach(p => table += `<tr><td>${p}</td><td>${roles[p]}</td><td>${alive[p]?'생존':'사망'}</td></tr>`);
    document.getElementById("chat").innerHTML += `<div class="box">${table}</table><br><button onclick="location.reload()">홈으로</button></div>`;
    return true;
}
</script>
</body>
</html>
